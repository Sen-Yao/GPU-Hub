version: '3.8'

services:
  gpuhub-control-plane:
    build:
      context: ./control_plane
      dockerfile: Dockerfile
    container_name: gpuhub-control-plane
    ports:
      - "${GPUHUB_PORT:-8003}:${GPUHUB_PORT:-8003}"
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-gpuhub}
      - GPUHUB_PORT=${GPUHUB_PORT:-8003}
    volumes:
      - ./frontend:/app/frontend:ro
    restart: unless-stopped
    network_mode: bridge

# Node Agent 不在 Docker 中运行（需要直接访问 GPU）
# 在算力端直接运行: python3 node_agent/main.py