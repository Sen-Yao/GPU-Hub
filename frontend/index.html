<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPUHub Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0f0d;
            --bg-secondary: #141a17;
            --bg-card: #1a201d;
            --text-primary: #e8efe8;
            --text-secondary: #9ba89b;
            --accent-green: #00ff88;
            --accent-blue: #00d4ff;
            --accent-red: #ff3b3b;
            --accent-yellow: #ffd700;
            --border-color: #2a352d;
            --shadow-glow: 0 0 20px rgba(0, 255, 136, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 1000;
        }

        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .logo {
            font-family: 'Space Mono', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-green);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
            border-radius: 4px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .status-badge {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--accent-green);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        nav {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        nav button, .lang-toggle button {
            font-family: 'JetBrains Mono', monospace;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        nav button.active,
        .lang-toggle button.active {
            background: var(--bg-card);
            color: var(--accent-green);
            border-color: var(--accent-green);
            box-shadow: var(--shadow-glow);
        }

        nav button:hover,
        .lang-toggle button:hover {
            border-color: var(--accent-green);
            color: var(--text-primary);
        }

        .lang-btn {
            width: 32px;
            height: 32px;
            background: transparent;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            padding: 0;
        }

        .lang-btn:hover {
            background: rgba(0, 255, 136, 0.1);
        }

        .lang-btn svg {
            width: 20px;
            height: 20px;
        }

        main {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease forwards;
            opacity: 0;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }
        .card:nth-child(5) { animation-delay: 0.5s; }
        .card:nth-child(6) { animation-delay: 0.6s; }
        .card:nth-child(7) { animation-delay: 0.7s; }
        .card:nth-child(8) { animation-delay: 0.8s; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            border-color: var(--accent-green);
            box-shadow: var(--shadow-glow);
        }

        .card-header {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .gpu-meter {
            height: 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .gpu-meter-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .gpu-meter-fill.warning {
            background: linear-gradient(90deg, var(--accent-yellow), var(--accent-red));
        }

        .gpu-meter-fill.danger {
            background: var(--accent-red);
        }

        .gpu-info {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            gap: 1rem;
        }

        .request-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .request-table th {
            font-size: 0.85rem;
            color: var(--text-secondary);
            padding: 0.75rem;
            border-bottom: 1px solid var(--border-color);
            text-align: left;
        }

        .request-table td {
            font-size: 0.9rem;
            padding: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }

        .request-table tr:hover {
            background: var(--bg-secondary);
        }

        .status-tag {
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status-tag.received,
        .status-tag.queued {
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
        }

        .status-tag.running,
        .status-tag.dispatched,
        .status-tag.scheduled {
            background: rgba(255, 215, 0, 0.1);
            color: var(--accent-yellow);
            border: 1px solid var(--accent-yellow);
        }

        .status-tag.succeeded {
            background: rgba(0, 255, 136, 0.1);
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
        }

        .status-tag.failed,
        .status-tag.cancelled,
        .status-tag.timed_out {
            background: rgba(255, 59, 59, 0.1);
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
            animation: slideIn 0.5s ease forwards;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-green);
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            header { padding: 1rem; }
            nav { gap: 0.5rem; }
            nav button { padding: 0.5rem 1rem; font-size: 0.8rem; }
            main { padding: 1rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .card-grid { grid-template-columns: 1fr; }
            .header-right { width: 100%; justify-content: space-between; }
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .refresh-btn {
            background: var(--accent-green);
            color: var(--bg-primary);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .refresh-btn:hover {
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            transform: translateY(-2px);
        }

        .timestamp {
            font-size: 0.85rem;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        /* Login page */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-primary);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #login-overlay.hidden { display: none; }

        .login-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box .logo {
            justify-content: center;
            margin-bottom: 2rem;
            font-size: 2rem;
        }

        .login-box .logo-icon {
            width: 36px;
            height: 36px;
        }

        .login-input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .login-input:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 12px rgba(0, 255, 136, 0.15);
        }

        .login-input::placeholder {
            color: var(--text-secondary);
        }

        .login-btn {
            width: 100%;
            padding: 0.9rem;
            background: var(--accent-green);
            color: var(--bg-primary);
            border: none;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .login-btn:hover {
            box-shadow: 0 0 24px rgba(0, 255, 136, 0.35);
            transform: translateY(-2px);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .login-error {
            color: var(--accent-red);
            font-size: 0.85rem;
            margin-top: 1rem;
            min-height: 1.2rem;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            border-color: var(--accent-red);
            color: var(--accent-red);
        }
    </style>
</head>
<body>
    <!-- Login overlay -->
    <div id="login-overlay">
        <div class="login-box">
            <div class="logo">
                <div class="logo-icon"></div>
                GPUHub
            </div>
            <form id="login-form" onsubmit="handleLogin(event)">
                <input type="password" id="login-password" class="login-input" placeholder="Admin Password" autocomplete="current-password" autofocus>
                <button type="submit" class="login-btn" id="login-submit">Login</button>
                <div class="login-error" id="login-error"></div>
            </form>
        </div>
    </div>

    <header id="app-header">
        <div class="logo">
            <div class="logo-icon"></div>
            GPUHub
        </div>
        <div class="header-right">
            <div class="status-badge">
                <div class="status-dot"></div>
                <span data-i18n="systemOnline">System Online</span>
            </div>
            <button class="lang-btn" onclick="toggleLanguage()" title="切换语言">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <text x="2" y="18" font-size="12" font-family="sans-serif" fill="var(--accent-green)" font-weight="600">文</text>
                    <text x="14" y="18" font-size="10" font-family="sans-serif" fill="var(--text-secondary)" font-weight="600">A</text>
                </svg>
            </button>
            <button class="logout-btn" onclick="handleLogout()" data-i18n="logout">Logout</button>
            <nav>
                <button class="active tab-btn" data-tab="requests" onclick="switchTab('requests', event)" data-i18n="requests">Requests</button>
                <button class="tab-btn" data-tab="nodes" onclick="switchTab('nodes', event)" data-i18n="nodes">Nodes</button>
                <button class="tab-btn" data-tab="queues" onclick="switchTab('queues', event)" data-i18n="queues">Queues</button>
            </nav>
        </div>
    </header>

    <main>
        <div class="stats-grid">
            <div class="stat-item" style="animation-delay: 0.1s">
                <div class="stat-value" id="total-requests">-</div>
                <div class="stat-label" data-i18n="totalRequests">Total Requests</div>
            </div>
            <div class="stat-item" style="animation-delay: 0.2s">
                <div class="stat-value" id="active-nodes">-</div>
                <div class="stat-label" data-i18n="activeNodes">Active Nodes</div>
            </div>
            <div class="stat-item" style="animation-delay: 0.3s">
                <div class="stat-value" id="queue-size">-</div>
                <div class="stat-label" data-i18n="queueSize">Queue Size</div>
            </div>
            <div class="stat-item" style="animation-delay: 0.4s">
                <div class="stat-value" id="success-rate">-</div>
                <div class="stat-label" data-i18n="successRate">Success Rate</div>
            </div>
        </div>

        <div id="requests-tab" class="tab-content active">
            <div class="card">
                <div class="card-header">
                    <button class="refresh-btn" onclick="loadRequests()">↻ <span data-i18n="refresh">Refresh</span></button>
                    <span class="timestamp" id="requests-timestamp"></span>
                </div>
                <div class="card-title" data-i18n="recentRequests">Recent Requests</div>
                <div id="requests-container">
                    <div class="loading"><div class="loading-spinner"></div></div>
                </div>
            </div>
        </div>

        <div id="nodes-tab" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <button class="refresh-btn" onclick="loadNodes()">↻ <span data-i18n="refresh">Refresh</span></button>
                    <span class="timestamp" id="nodes-timestamp"></span>
                </div>
                <div class="card-title" data-i18n="gpuNodes">GPU Nodes</div>
                <div id="nodes-container">
                    <div class="loading"><div class="loading-spinner"></div></div>
                </div>
            </div>
        </div>

        <div id="queues-tab" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <button class="refresh-btn" onclick="loadQueues()">↻ <span data-i18n="refresh">Refresh</span></button>
                    <span class="timestamp" id="queues-timestamp"></span>
                </div>
                <div class="card-title" data-i18n="taskQueue">Task Queue</div>
                <div id="queues-container">
                    <div class="loading"><div class="loading-spinner"></div></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = window.location.origin;
        let currentLanguage = localStorage.getItem('gpuhub-language') || 'zh';

        // ==================== Auth ====================
        function getToken() {
            return localStorage.getItem('gpuhub-token');
        }

        function setToken(token) {
            localStorage.setItem('gpuhub-token', token);
        }

        function clearToken() {
            localStorage.removeItem('gpuhub-token');
        }

        function showLogin() {
            document.getElementById('login-overlay').classList.remove('hidden');
            document.getElementById('app-header').style.display = 'none';
            document.querySelector('main').style.display = 'none';
            document.getElementById('login-password').focus();
        }

        function showDashboard() {
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('app-header').style.display = '';
            document.querySelector('main').style.display = '';
        }

        async function handleLogin(event) {
            event.preventDefault();
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            const btn = document.getElementById('login-submit');
            errorEl.textContent = '';
            btn.disabled = true;
            btn.textContent = '...';

            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({password})
                });
                const data = await res.json();
                if (!res.ok) {
                    errorEl.textContent = data.detail || 'Login failed';
                    btn.disabled = false;
                    btn.textContent = 'Login';
                    return;
                }
                setToken(data.token);
                document.getElementById('login-password').value = '';
                showDashboard();
                setLanguage(currentLanguage);
            } catch (err) {
                errorEl.textContent = 'Network error';
            }
            btn.disabled = false;
            btn.textContent = 'Login';
        }

        async function handleLogout() {
            const token = getToken();
            if (token) {
                try {
                    await fetch(`${API_BASE}/auth/logout`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({token})
                    });
                } catch {}
            }
            clearToken();
            showLogin();
        }

        async function checkAuth() {
            const token = getToken();
            if (!token) { showLogin(); return; }
            try {
                const res = await fetch(`${API_BASE}/auth/verify`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({token})
                });
                if (res.ok) {
                    showDashboard();
                } else {
                    clearToken();
                    showLogin();
                }
            } catch {
                showLogin();
            }
        }

        // ==================== i18n ====================

        const i18n = {
            zh: {
                systemOnline: '系统在线',
                logout: '登出',
                requests: '请求',
                nodes: '节点',
                queues: '队列',
                totalRequests: '总请求数',
                activeNodes: '在线节点数',
                queueSize: '队列长度',
                successRate: '成功率',
                refresh: '刷新',
                recentRequests: '最近请求',
                gpuNodes: 'GPU 节点',
                taskQueue: '任务队列',
                requestId: '请求 ID',
                type: '类型',
                status: '状态',
                node: '节点',
                created: '创建时间',
                position: '位置',
                priority: '优先级',
                queuedAt: '入队时间',
                noRequests: '暂无请求',
                noNodes: '暂无在线节点',
                queueEmpty: '队列为空',
                lastUpdated: '最后更新',
                error: '错误',
                lastHeartbeat: '最后心跳',
                unknown: '未知',
                received: '已接收',
                validated: '已验证',
                queued: '排队中',
                scheduled: '已调度',
                dispatched: '已分发',
                running: '运行中',
                succeeded: '成功',
                failed: '失败',
                cancelled: '已取消',
                timed_out: '超时'
            },
            en: {
                systemOnline: 'System Online',
                logout: 'Logout',
                requests: 'Requests',
                nodes: 'Nodes',
                queues: 'Queues',
                totalRequests: 'Total Requests',
                activeNodes: 'Active Nodes',
                queueSize: 'Queue Size',
                successRate: 'Success Rate',
                refresh: 'Refresh',
                recentRequests: 'Recent Requests',
                gpuNodes: 'GPU Nodes',
                taskQueue: 'Task Queue',
                requestId: 'Request ID',
                type: 'Type',
                status: 'Status',
                node: 'Node',
                created: 'Created',
                position: 'Position',
                priority: 'Priority',
                queuedAt: 'Queued At',
                noRequests: 'No requests',
                noNodes: 'No nodes connected',
                queueEmpty: 'Queue empty',
                lastUpdated: 'Last updated',
                error: 'Error',
                lastHeartbeat: 'Last heartbeat',
                unknown: 'unknown',
                received: 'received',
                validated: 'validated',
                queued: 'queued',
                scheduled: 'scheduled',
                dispatched: 'dispatched',
                running: 'running',
                succeeded: 'succeeded',
                failed: 'failed',
                cancelled: 'cancelled',
                timed_out: 'timed out'
            }
        };

        function t(key) {
            return i18n[currentLanguage][key] || key;
        }

        function translateStatus(status) {
            return t(status) || status;
        }

        function toggleLanguage() {
            const newLang = currentLanguage === 'zh' ? 'en' : 'zh';
            setLanguage(newLang);
        }

        function setLanguage(lang) {
            currentLanguage = lang;
            localStorage.setItem('gpuhub-language', lang);
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.textContent = t(el.dataset.i18n);
            });
            const activeTab = document.querySelector('.tab-content.active').id.replace('-tab', '');
            if (activeTab === 'requests') loadRequests();
            if (activeTab === 'nodes') loadNodes();
            if (activeTab === 'queues') loadQueues();
        }

        function switchTab(tab, event) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`${tab}-tab`).classList.add('active');
            if (event) event.currentTarget.classList.add('active');
            if (tab === 'requests') loadRequests();
            if (tab === 'nodes') loadNodes();
            if (tab === 'queues') loadQueues();
        }

        function updateSuccessRate(requests) {
            const total = requests?.length || 0;
            if (!total) {
                document.getElementById('success-rate').textContent = '-';
                return;
            }
            const succeeded = requests.filter(r => r.status === 'succeeded').length;
            document.getElementById('success-rate').textContent = `${Math.round((succeeded / total) * 100)}%`;
        }

        async function loadRequests() {
            const container = document.getElementById('requests-container');
            const timestamp = document.getElementById('requests-timestamp');
            container.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';

            try {
                const response = await fetch(`${API_BASE}/dashboard/requests`);
                const data = await response.json();
                const requests = data.requests || [];
                document.getElementById('total-requests').textContent = requests.length;
                updateSuccessRate(requests);
                const table = `
                    <table class="request-table">
                        <thead>
                            <tr>
                                <th>${t('requestId')}</th>
                                <th>${t('type')}</th>
                                <th>${t('status')}</th>
                                <th>${t('node')}</th>
                                <th>${t('created')}</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${requests.slice(0, 20).map(r => `
                                <tr>
                                    <td>${r.request_id?.slice(0, 8)}...</td>
                                    <td>${r.task_type}</td>
                                    <td><span class="status-tag ${r.status}">${translateStatus(r.status)}</span></td>
                                    <td>${r.selected_node || '-'}</td>
                                    <td>${formatTime(r.created_at)}</td>
                                </tr>
                            `).join('') || `<tr><td colspan="5">${t('noRequests')}</td></tr>`}
                        </tbody>
                    </table>
                `;
                container.innerHTML = table;
                timestamp.textContent = `${t('lastUpdated')}: ${new Date().toLocaleTimeString(currentLanguage === 'zh' ? 'zh-CN' : 'en-US')}`;
            } catch (error) {
                container.innerHTML = `<div style="color: var(--accent-red);">${t('error')}: ${error.message}</div>`;
            }
        }

        async function loadNodes() {
            const container = document.getElementById('nodes-container');
            const timestamp = document.getElementById('nodes-timestamp');
            container.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';

            try {
                const response = await fetch(`${API_BASE}/dashboard/nodes`);
                const data = await response.json();
                const nodes = data.nodes || [];
                document.getElementById('active-nodes').textContent = nodes.length;
                const gpuCards = nodes.map(node => `
                    <div class="card-grid">
                        ${node.gpu_status?.map(gpu => `
                            <div class="card">
                                <div class="card-header">
                                    <span style="color: ${gpu.memory_used > 40000 ? 'var(--accent-red)' : 'var(--accent-green)'}">
                                        GPU ${gpu.gpu_id}
                                    </span>
                                </div>
                                <div class="gpu-meter">
                                    <div class="gpu-meter-fill ${gpu.memory_used > 40000 ? 'danger' : gpu.memory_used > 30000 ? 'warning' : ''}" style="width: ${(gpu.memory_used / gpu.memory_total * 100).toFixed(1)}%"></div>
                                </div>
                                <div class="gpu-info">
                                    <span>${gpu.memory_used.toLocaleString()} MB</span>
                                    <span>${((gpu.memory_used / gpu.memory_total) * 100).toFixed(1)}%</span>
                                </div>
                            </div>
                        `).join('') || ''}
                    </div>
                    <div style="margin-top: 1rem; color: var(--text-secondary);">
                        ${t('node')}: ${node.node_id || t('unknown')} | ${t('lastHeartbeat')}: ${formatTime(node.last_heartbeat)}
                    </div>
                `).join('');
                container.innerHTML = gpuCards || `<div style="color: var(--text-secondary);">${t('noNodes')}</div>`;
                timestamp.textContent = `${t('lastUpdated')}: ${new Date().toLocaleTimeString(currentLanguage === 'zh' ? 'zh-CN' : 'en-US')}`;
            } catch (error) {
                container.innerHTML = `<div style="color: var(--accent-red);">${t('error')}: ${error.message}</div>`;
            }
        }

        async function loadQueues() {
            const container = document.getElementById('queues-container');
            const timestamp = document.getElementById('queues-timestamp');
            container.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';

            try {
                const response = await fetch(`${API_BASE}/dashboard/queues`);
                const data = await response.json();
                const queue = data.queue || [];
                document.getElementById('queue-size').textContent = queue.length;
                const table = `
                    <table class="request-table">
                        <thead>
                            <tr>
                                <th>${t('position')}</th>
                                <th>${t('requestId')}</th>
                                <th>${t('type')}</th>
                                <th>${t('priority')}</th>
                                <th>${t('queuedAt')}</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${queue.slice(0, 20).map((item, i) => `
                                <tr>
                                    <td>${i + 1}</td>
                                    <td>${item.request_id?.slice(0, 8)}...</td>
                                    <td>${item.task_type}</td>
                                    <td>${item.priority || 1}</td>
                                    <td>${formatTime(item.created_at)}</td>
                                </tr>
                            `).join('') || `<tr><td colspan="5">${t('queueEmpty')}</td></tr>`}
                        </tbody>
                    </table>
                `;
                container.innerHTML = table;
                timestamp.textContent = `${t('lastUpdated')}: ${new Date().toLocaleTimeString(currentLanguage === 'zh' ? 'zh-CN' : 'en-US')}`;
            } catch (error) {
                container.innerHTML = `<div style="color: var(--accent-red);">${t('error')}: ${error.message}</div>`;
            }
        }

        function formatTime(timeStr) {
            if (!timeStr) return '-';
            try {
                return new Date(timeStr).toLocaleString(currentLanguage === 'zh' ? 'zh-CN' : 'en-US', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
            } catch {
                return timeStr;
            }
        }

        setLanguage(currentLanguage);
        checkAuth();

        setInterval(() => {
            const activeTab = document.querySelector('.tab-content.active').id.replace('-tab', '');
            if (activeTab === 'requests') loadRequests();
            if (activeTab === 'nodes') loadNodes();
            if (activeTab === 'queues') loadQueues();
        }, 10000);
    </script>
</body>
</html>
