<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPUHub Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0f0d;
            --bg-secondary: #141a17;
            --bg-card: #1a201d;
            --text-primary: #e8efe8;
            --text-secondary: #9ba89b;
            --accent-green: #00ff88;
            --accent-blue: #00d4ff;
            --accent-red: #ff3b3b;
            --accent-yellow: #ffd700;
            --border-color: #2a352d;
            --shadow-glow: 0 0 20px rgba(0, 255, 136, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 1000;
        }

        /* Header */
        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Space Mono', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-green);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
            border-radius: 4px;
        }

        .status-badge {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--accent-green);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Navigation */
        nav {
            display: flex;
            gap: 1rem;
        }

        nav button {
            font-family: 'JetBrains Mono', monospace;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        nav button.active {
            background: var(--bg-card);
            color: var(--accent-green);
            border-color: var(--accent-green);
            box-shadow: var(--shadow-glow);
        }

        nav button:hover {
            border-color: var(--accent-green);
            color: var(--text-primary);
        }

        /* Main container */
        main {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Cards */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease forwards;
            opacity: 0;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }
        .card:nth-child(5) { animation-delay: 0.5s; }
        .card:nth-child(6) { animation-delay: 0.6s; }
        .card:nth-child(7) { animation-delay: 0.7s; }
        .card:nth-child(8) { animation-delay: 0.8s; }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:hover {
            border-color: var(--accent-green);
            box-shadow: var(--shadow-glow);
        }

        .card-header {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        /* GPU meter */
        .gpu-meter {
            height: 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .gpu-meter-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .gpu-meter-fill.warning {
            background: linear-gradient(90deg, var(--accent-yellow), var(--accent-red));
        }

        .gpu-meter-fill.danger {
            background: var(--accent-red);
        }

        .gpu-info {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Request table */
        .request-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .request-table th {
            font-size: 0.85rem;
            color: var(--text-secondary);
            padding: 0.75rem;
            border-bottom: 1px solid var(--border-color);
            text-align: left;
        }

        .request-table td {
            font-size: 0.9rem;
            padding: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }

        .request-table tr:hover {
            background: var(--bg-secondary);
        }

        .status-tag {
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status-tag.queued {
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
        }

        .status-tag.running {
            background: rgba(255, 215, 0, 0.1);
            color: var(--accent-yellow);
            border: 1px solid var(--accent-yellow);
        }

        .status-tag.succeeded {
            background: rgba(0, 255, 136, 0.1);
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
        }

        .status-tag.failed {
            background: rgba(255, 59, 59, 0.1);
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
        }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
            animation: slideIn 0.5s ease forwards;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-green);
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Loading animation */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                padding: 1rem;
            }

            nav {
                gap: 0.5rem;
            }

            nav button {
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }

            main {
                padding: 1rem;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .card-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Tab content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Refresh button */
        .refresh-btn {
            background: var(--accent-green);
            color: var(--bg-primary);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .refresh-btn:hover {
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            transform: translateY(-2px);
        }

        /* Timestamp */
        .timestamp {
            font-size: 0.85rem;
            color: var(--text-secondary);
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon"></div>
            GPUHub
        </div>
        <div class="status-badge">
            <div class="status-dot"></div>
            <span>System Online</span>
        </div>
        <nav>
            <button class="active" onclick="switchTab('requests')">Requests</button>
            <button onclick="switchTab('nodes')">Nodes</button>
            <button onclick="switchTab('queues')">Queues</button>
        </nav>
    </header>

    <main>
        <!-- Stats Overview -->
        <div class="stats-grid">
            <div class="stat-item" style="animation-delay: 0.1s">
                <div class="stat-value" id="total-requests">-</div>
                <div class="stat-label">Total Requests</div>
            </div>
            <div class="stat-item" style="animation-delay: 0.2s">
                <div class="stat-value" id="active-nodes">-</div>
                <div class="stat-label">Active Nodes</div>
            </div>
            <div class="stat-item" style="animation-delay: 0.3s">
                <div class="stat-value" id="queue-size">-</div>
                <div class="stat-label">Queue Size</div>
            </div>
            <div class="stat-item" style="animation-delay: 0.4s">
                <div class="stat-value" id="success-rate">-</div>
                <div class="stat-label">Success Rate</div>
            </div>
        </div>

        <!-- Requests Tab -->
        <div id="requests-tab" class="tab-content active">
            <div class="card">
                <div class="card-header">
                    <button class="refresh-btn" onclick="loadRequests()">↻ Refresh</button>
                    <span class="timestamp" id="requests-timestamp"></span>
                </div>
                <div class="card-title">Recent Requests</div>
                <div id="requests-container">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Nodes Tab -->
        <div id="nodes-tab" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <button class="refresh-btn" onclick="loadNodes()">↻ Refresh</button>
                    <span class="timestamp" id="nodes-timestamp"></span>
                </div>
                <div class="card-title">GPU Nodes</div>
                <div id="nodes-container">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Queues Tab -->
        <div id="queues-tab" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <button class="refresh-btn" onclick="loadQueues()">↻ Refresh</button>
                    <span class="timestamp" id="queues-timestamp"></span>
                </div>
                <div class="card-title">Task Queue</div>
                <div id="queues-container">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = window.location.origin;

        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
            document.getElementById(`${tab}-tab`).classList.add('active');
            event.target.classList.add('active');

            // Load data for the tab
            if (tab === 'requests') loadRequests();
            if (tab === 'nodes') loadNodes();
            if (tab === 'queues') loadQueues();
        }

        // Load requests
        async function loadRequests() {
            const container = document.getElementById('requests-container');
            const timestamp = document.getElementById('requests-timestamp');
            container.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';

            try {
                const response = await fetch(`${API_BASE}/dashboard/requests`);
                const data = await response.json();

                // Update stats
                document.getElementById('total-requests').textContent = data.requests?.length || 0;

                // Build table
                const table = `
                    <table class="request-table">
                        <thead>
                            <tr>
                                <th>Request ID</th>
                                <th>Type</th>
                                <th>Status</th>
                                <th>Node</th>
                                <th>Created</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.requests?.slice(0, 20).map(r => `
                                <tr>
                                    <td>${r.request_id?.slice(0, 8)}...</td>
                                    <td>${r.task_type}</td>
                                    <td><span class="status-tag ${r.status}">${r.status}</span></td>
                                    <td>${r.selected_node || '-'}</td>
                                    <td>${formatTime(r.created_at)}</td>
                                </tr>
                            `).join('') || '<tr><td colspan="5">No requests</td></tr>'}
                        </tbody>
                    </table>
                `;
                container.innerHTML = table;
                timestamp.textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
            } catch (error) {
                container.innerHTML = `<div style="color: var(--accent-red);">Error: ${error.message}</div>`;
            }
        }

        // Load nodes
        async function loadNodes() {
            const container = document.getElementById('nodes-container');
            const timestamp = document.getElementById('nodes-timestamp');
            container.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';

            try {
                const response = await fetch(`${API_BASE}/dashboard/nodes`);
                const data = await response.json();

                // Update stats
                document.getElementById('active-nodes').textContent = data.nodes?.length || 0;

                // Build GPU cards
                const nodes = data.nodes || [];
                const gpuCards = nodes.map(node => `
                    <div class="card-grid">
                        ${node.gpu_status?.map(gpu => `
                            <div class="card">
                                <div class="card-header">
                                    <span style="color: ${gpu.memory_used > 40000 ? 'var(--accent-red)' : 'var(--accent-green)'}">
                                        GPU ${gpu.gpu_id}
                                    </span>
                                </div>
                                <div class="gpu-meter">
                                    <div class="gpu-meter-fill ${gpu.memory_used > 40000 ? 'danger' : gpu.memory_used > 30000 ? 'warning' : ''}"
                                         style="width: ${(gpu.memory_used / gpu.memory_total * 100).toFixed(1)}%"></div>
                                </div>
                                <div class="gpu-info">
                                    <span>${gpu.memory_used.toLocaleString()} MB</span>
                                    <span>${((gpu.memory_used / gpu.memory_total) * 100).toFixed(1)}%</span>
                                </div>
                            </div>
                        `).join('') || ''}
                    </div>
                    <div style="margin-top: 1rem; color: var(--text-secondary);">
                        Node: ${node.node_id || 'unknown'} | Last heartbeat: ${formatTime(node.last_heartbeat)}
                    </div>
                `).join('');

                container.innerHTML = gpuCards || '<div style="color: var(--text-secondary);">No nodes connected</div>';
                timestamp.textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
            } catch (error) {
                container.innerHTML = `<div style="color: var(--accent-red);">Error: ${error.message}</div>`;
            }
        }

        // Load queues
        async function loadQueues() {
            const container = document.getElementById('queues-container');
            const timestamp = document.getElementById('queues-timestamp');
            container.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';

            try {
                const response = await fetch(`${API_BASE}/dashboard/queues`);
                const data = await response.json();

                // Update stats
                document.getElementById('queue-size').textContent = data.queue?.length || 0;

                // Build queue table
                const table = `
                    <table class="request-table">
                        <thead>
                            <tr>
                                <th>Position</th>
                                <th>Request ID</th>
                                <th>Type</th>
                                <th>Priority</th>
                                <th>Queued At</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.queue?.slice(0, 20).map((item, i) => `
                                <tr>
                                    <td>${i + 1}</td>
                                    <td>${item.request_id?.slice(0, 8)}...</td>
                                    <td>${item.task_type}</td>
                                    <td>${item.priority || 1}</td>
                                    <td>${formatTime(item.created_at)}</td>
                                </tr>
                            `).join('') || '<tr><td colspan="5">Queue empty</td></tr>'}
                        </tbody>
                    </table>
                `;
                container.innerHTML = table;
                timestamp.textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
            } catch (error) {
                container.innerHTML = `<div style="color: var(--accent-red);">Error: ${error.message}</div>`;
            }
        }

        // Format time
        function formatTime(timeStr) {
            if (!timeStr) return '-';
            try {
                return new Date(timeStr).toLocaleString('zh-CN', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
            } catch {
                return timeStr;
            }
        }

        // Initial load
        loadRequests();

        // Auto refresh (every 10 seconds)
        setInterval(() => {
            const activeTab = document.querySelector('.tab-content.active').id.replace('-tab', '');
            if (activeTab === 'requests') loadRequests();
            if (activeTab === 'nodes') loadNodes();
            if (activeTab === 'queues') loadQueues();
        }, 10000);
    </script>
</body>
</html>
